<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storefront - Cart and Checkout</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Storefront</h1>
    <div class="topbar-actions">
      <input type="text" id="searchInput" placeholder="Search products..." />
      <button id="cartBtn" class="cart-btn">Cart <span id="cartCount">0</span></button>
    </div>
  </header>

  <main>
    <div class="filters" id="filters"></div>
    <section class="product-grid" id="productGrid"></section>
  </main>

  <aside id="cartDrawer" class="cart-drawer">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button id="closeCart">x</button>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total">Total: <span id="cartTotal">Rs.0</span></div>
      <button id="checkoutBtn" class="checkout-btn">Checkout</button>
    </div>
  </aside>
  <div id="overlay" class="overlay"></div>

  <div id="checkoutModal" class="modal">
    <div class="modal-content">
      <button id="closeCheckout" class="modal-close">x</button>
      <h2>Checkout</h2>
      <form id="checkoutForm">
        <label>Full Name<input type="text" id="custName" required /></label>
        <label>Address<input type="text" id="custAddress" required /></label>
        <label>Email<input type="email" id="custEmail" required /></label>
        <label>Card Number<input type="text" id="custCard" maxlength="19" placeholder="1234 5678 9012 3456" required /></label>
        <div class="form-row">
          <label>Expiry<input type="text" id="custExpiry" placeholder="MM/YY" required /></label>
          <label>CVV<input type="text" id="custCvv" maxlength="3" required /></label>
        </div>
        <button type="submit" class="place-order-btn">Place Order (Simulated)</button>
      </form>
    </div>
  </div>

  <div id="confirmModal" class="modal">
    <div class="modal-content confirm-content">
      <h2>Order Confirmed</h2>
      <p>Thank you, <span id="confirmName"></span>! Your simulated order <strong id="confirmId"></strong> has been placed.</p>
      <p class="confirm-note">This is a demo checkout - no real payment was processed.</p>
      <button id="closeConfirm" class="checkout-btn">Continue Shopping</button>
    </div>
  </div>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
